---
layout: default
---
<style>
  /* --- Profile Banner --- */
  .profile-banner {
    display: flex;
    width: 100vw;
    height: 400px;
    margin-left: calc(-50vw + 50%);
    margin-top: -30px;
    margin-bottom: 60px;
  }

  .banner-text {
    width: 50%;
    flex: 0 0 50%;
    background-color: #508c96;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 10vw;
    padding-right: 5%;
    color: #ffffff;
  }

  .banner-text h1 {
    font-size: 3.5rem;
    margin: 0;
    font-weight: 700;
    color: #ffffff !important;
  }

  .banner-role {
    font-size: 1.8rem;
    font-weight: 300;
    margin-top: 10px;
    color: #ffffff;
    opacity: 0.9;
  }

  /* The underline */
  .banner-text::after {
    content: "";
    display: block;
    width: 80px;
    height: 5px;
    background-color: #112226;
    margin-top: 25px;
  }

  /* The Photo Side */
  .banner-photo {
    width: 50%;
    flex: 0 0 50%;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #ffffff;
  }

  /* --- Bio & Contact Section --- */
  .profile-body {
    display: flex;
    gap: 60px;
    margin-bottom: 60px;
    align-items: flex-start;
  }

  .profile-bio {
    flex: 1;
    font-size: 17px;
    line-height: 1.8;
    color: #444;
  }

  /* Formats the markdown headers */
  .profile-bio h2, .profile-bio h3 {
    color: #0f2027;
    margin-top: 40px;
    margin-bottom: 20px;
    border-bottom: 2px solid #e5e5e5;
    padding-bottom: 10px;
    font-size: 22px;
  }

  .profile-bio ul {
    padding-left: 20px;
    margin-bottom: 30px;
  }

  .profile-bio li {
    margin-bottom: 10px;
  }

  /* Light Grey Contact Card */
  .contact-card {
    width: 200px;
    flex-shrink: 0;
    background-color: #f9f9f9;
    padding: 30px;
    border-radius: 4px;
    border: 1px solid #eaeaea;
  }

  .contact-card h3 {
    margin-top: 0;
    font-size: 20px;
    color: #2b2b2b;
    margin-bottom: 20px;
    border-bottom: none;
  }

  .contact-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .contact-card li {
    margin-bottom: 15px;
  }

  .contact-card li:last-child {
    margin-bottom: 0;
  }

  .contact-card a {
    color: #555;
    text-decoration: none;
    display: flex;
    align-items: center;
    font-weight: 500;
    font-size: 15px;
    transition: color 0.2s ease;
  }

  .contact-card a:hover {
    color: #508c96; /* Turns teal on hover */
  }

  /* Adding icon (e.g., email, Google Scholar)
  .contact-icon {
    width: 15px; /* Reduced size */
    height: 15px; /* Reduced size */
    margin-right: 12px;
    fill: #508c96;
    transition: fill 0.2s ease;
    flex-shrink: 0;
  }

  .contact-card a:hover .contact-icon {
    fill: #112226;
  }

  /* --- Mobile Adjustments --- */
  @media screen and (max-width: 900px) {
    .profile-banner {
      flex-direction: column-reverse; /* Puts the photo ON TOP of the text on phones */
      height: auto;
    }
    .banner-text {
      width: 100%;
      flex: none;
      padding: 50px 5%;
    }
    .banner-text h1 {
      font-size: 2.5rem;
    }
    .banner-photo {
      width: 100%;
      flex: none;
      height: 400px;
    }
    .profile-body {
      flex-direction: column;
      gap: 40px;
    }
    .contact-card {
      width: 100%;
      box-sizing: border-box;
    }
  }
</style>

<div class="profile-banner">
  <div class="banner-text">
    <h1>{{ page.title }}</h1>
    <div class="banner-role">{{ page.role }}</div>
  </div>
  <div class="banner-photo" style="background-image: url('{{ page.image | relative_url }}');"></div>
</div>

<div class="profile-body">

  <div class="profile-bio">
    {{ content }}
  </div>

  <div class="contact-card">
    <h3>Contact</h3>
    <ul>
      {% if page.email %}
        <li>
          <a href="mailto:{{ page.email }}">

</div>
