<style>

  .footer-grid {

    gap: 30px;
  }

  .footer-nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .footer-nav a {
    color: #ffffff;
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.2s ease;
    font-size: 15px;
    line-height: 1.8;
  }

  .footer-nav a:hover {
    opacity: 1;
    text-decoration: underline;
  }

  .footer-center {
    text-align: left;
  }

  .footer-right {
    text-align: right;
  }

  /* Stacks everything nicely in the center on phone screens */
  @media screen and (max-width: 768px) {
    .footer-grid {
      flex-direction: column;
      text-align: center;
    }
    .footer-center, .footer-right, .footer-nav {
      text-align: center;
      width: 100%;
    }
  }
